    automoderator_instructions:
      header: 'Инструкции к расширению'
      text: "<li>Кратко: если пользователь соответствует критерию X, выполнить действие Y. Если пользователь перестаёт соответствовать критерию X, выполнить действие Z.</li>\n<li><strong>Критерии:</strong> Критерии — основа этого расширения. Они представляют собой произвольные наборы метрик и требований. Когда пользователь начинает соответствовать критерию, выполняются все действия при получении для этого критерия. Когда пользователь перестаёт соответствовать критерию, выполняются все действия при потере для этого критерия.</li>\n<ul>\n  <li><strong>Метрика:</strong> Числовое условие. Например, количество сообщений или число полученных реакций. Критерий может требовать определённый диапазон, минимум или максимум значений метрик.</li>\n  <li><strong>Требование:</strong> Логическое условие. Например, отсутствие блокировки или наличие email, соответствующего определённому регулярному выражению.</li>\n</ul>\n<li><strong>Действия:</strong> Автоматически выполняемые операции при получении или потере критерия. Это может быть добавление или удаление из группы, отправка email либо блокировка пользователя.</li>\n<li><strong>Триггер:</strong> Набор событий, при которых критерии пользователя пересчитываются. Триггеры являются частью определений метрик и требований. Все критерии проверяются при входе в аккаунт — это «универсальный триггер».</li>\n<li>Действия при потере всегда выполняются раньше действий при получении. Благодаря этому действие будет сохраняться, пока пользователь соответствует хотя бы одному критерию, который назначает его при получении.</li>\n<li>Имейте в виду, что действия выполняются только при получении и при потере критерия. Ручные изменения, внесённые в период, когда пользователь соответствует критерию, не приведут к повторному выполнению действий при получении.</li>\n<li>Если удалить критерий, действия при потере НЕ будут выполнены для пользователей, которые на момент удаления соответствуют этому критерию.</li>\n<li>Если вы используете критерии для управления группами, рекомендуется выделить отдельный набор групп, управляемых критериями. Добавлять или удалять пользователей из таких групп вручную будет невозможно.</li>\n"
